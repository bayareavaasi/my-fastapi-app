name: Daily Nifty IT Monitor
on:
  schedule:
    # 10:45 UTC = 4:15 PM IST, 15 min after NSE close (Mon-Fri)
    - cron: '45 10 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt into Node.js 24 ahead of June 2 deadline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 src/app/monitor.py
