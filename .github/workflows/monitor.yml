name: Daily Nifty IT Monitor
on:
  schedule:
    # 10:00 UTC is 3:30 PM IST (Mon-Fri)
    - cron: '45 10 * * 1-5'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Monitor
        env:
          # This maps the GitHub Secret to the Environment Variable your code needs
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 src/app/monitor.py
